services:
  estagios:
    image: estagios:latest
    container_name: estagios
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - estagios-network
    volumes:
      - ./:/var/www/html
    environment:
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"

  mariadb:
    image: mariadb:11
    container_name: estagios_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: estagios
      MYSQL_USER: estagios
      MYSQL_PASSWORD: estagios
      MYSQL_ROOT_PASSWORD: estagios
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - estagios-network

  selenium:
    image: selenium/standalone-chrome
    container_name: estagios_selenium
    ports:
      - "7900:7900" # VNC (pra ver o browser rodando)
    networks:
      - estagios-network
    shm_size: 2gb
    
  senhaunica-faker:
    image: uspdev/senhaunica-faker
    container_name: estagios_senhaunica-faker
    ports:
      - "3141:3141"
    environment:
          - APP_URL=http://auth.local:3141
    networks:
      estagios-network:
        aliases:
          - auth.local

networks:
  estagios-network:

volumes:
  mariadb_data: